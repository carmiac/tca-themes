[theme]
name = "Nord Dark"
slug = "nord-dark"
author = "Arctic Ice Studio / TCA Project"
version = "1.0.0"
description = "An arctic, north-bluish color palette. Based on the Nord theme by Arctic Ice Studio."
dark = true


[ansi]
black = "#2e3440"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#5e81ac"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#d8dee9"

bright_black = "#434c5e"
bright_red = "#bf616a"
bright_green = "#a3be8c"
bright_yellow = "#ebcb8b"
bright_blue = "#81a1c1"
bright_magenta = "#b48ead"
bright_cyan = "#88c0d0"
bright_white = "#eceff4"

# Palette: all ramps are 0-indexed arrays, darkest→lightest
# neutral: 0=#2e3440  1=#3b4252  2=#434c5e  3=#d8dee9  4=#eceff4
# frost:   0=#5e81ac  1=#81a1c1  2=#88c0d0  3=#8fbcbb
# single-entry ramps: 0 = only color
[palette]
neutral = [
  "ansi.black",
  "#3b4252",
  "ansi.bright_black",
  "ansi.white",
  "ansi.bright_white",
]
frost = ["#5e81ac", "#81a1c1", "#88c0d0", "#8fbcbb"]
orange = ["#d08770"]

[base16]
base00 = "palette.neutral.0"
base01 = "palette.neutral.1"
base02 = "palette.neutral.2"
base03 = "palette.neutral.2"
base04 = "palette.neutral.3"
base05 = "palette.neutral.3"
base06 = "palette.neutral.4"
base07 = "palette.neutral.4"
base08 = "ansi.red"
base09 = "palette.orange.0"
base0A = "ansi.yellow"
base0B = "ansi.green"
base0C = "palette.frost.3"
base0D = "palette.frost.0"
base0E = "ansi.magenta"
base0F = "palette.orange.0"

[semantic]
error = "ansi.red"
warning = "ansi.yellow"
success = "ansi.green"
info = "palette.frost.1"
highlight = "ansi.magenta"
link = "palette.frost.2"

[ui.bg]
primary = "palette.neutral.0"
secondary = "palette.neutral.1"

[ui.fg]
primary = "palette.neutral.4"
secondary = "palette.neutral.3"
muted = "palette.neutral.2"

[ui.border]
primary = "palette.frost.0"
muted = "palette.neutral.2"

[ui.cursor]
primary = "palette.neutral.3"
muted = "palette.neutral.2"

[ui.selection]
bg = "palette.neutral.2"
fg = "palette.neutral.4"
