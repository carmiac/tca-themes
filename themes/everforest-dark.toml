[theme]
name = "Everforest Dark"
slug = "everforest-dark"
author = "sainnhe / TCA Project"
version = "1.0.0"
description = "Comfortable green-tinted dark theme with warm, natural tones. Based on Everforest by sainnhe."
dark = true

[ansi]
black = "#2b3339"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

bright_black = "#859289"
bright_red = "#e67e80"
bright_green = "#a7c080"
bright_yellow = "#dbbc7f"
bright_blue = "#7fbbb3"
bright_magenta = "#d699b6"
bright_cyan = "#83c092"
bright_white = "#e9e8d2"

# Palette: darkest→lightest
# neutral: 0=#2b3339  1=#323c41  2=#3a464c  3=#434f55  4=#4a555b  5=#859289  6=#9da9a0  7=#d3c6aa  8=#e9e8d2
[palette]
neutral = [
  "#2b3339",
  "#323c41",
  "#3a464c",
  "#434f55",
  "#4a555b",
  "#859289",
  "#9da9a0",
  "#d3c6aa",
  "#e9e8d2",
]
red = ["#5c1a1a", "#c2504f", "#e67e80"]
green = ["#2a4020", "#6e9a56", "#a7c080"]
yellow = ["#5c4010", "#b0922a", "#dbbc7f"]
blue = ["#1e3f45", "#4d8c8a", "#7fbbb3"]
purple = ["#3d1f45", "#a05c8a", "#d699b6"]
aqua = ["#1f3d2a", "#4e8a65", "#83c092"]
orange = ["#5c2e00", "#c47214", "#e69875"]

[base16]
base00 = "palette.neutral.0"
base01 = "palette.neutral.1"
base02 = "palette.neutral.2"
base03 = "palette.neutral.3"
base04 = "palette.neutral.5"
base05 = "palette.neutral.7"
base06 = "palette.neutral.8"
base07 = "#e9e8d2"
base08 = "palette.red.2"
base09 = "palette.orange.2"
base0A = "palette.yellow.2"
base0B = "palette.green.2"
base0C = "palette.aqua.2"
base0D = "palette.blue.2"
base0E = "palette.purple.2"
base0F = "palette.red.1"

[semantic]
error = "palette.red.2"
warning = "palette.orange.2"
info = "palette.blue.2"
success = "palette.green.2"
highlight = "palette.yellow.2"
link = "palette.blue.2"

[ui.bg]
primary = "palette.neutral.0"
secondary = "palette.neutral.1"

[ui.fg]
primary = "palette.neutral.8"
secondary = "palette.neutral.6"
muted = "palette.neutral.5"

[ui.border]
primary = "palette.green.1"
muted = "palette.neutral.3"

[ui.cursor]
primary = "palette.green.2"
muted = "palette.neutral.5"

[ui.selection]
bg = "palette.neutral.2"
fg = "palette.neutral.7"
