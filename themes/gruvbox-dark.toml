[theme]
name = "Gruvbox Dark"
slug = "gruvbox-dark"
author = "morhetz / TCA Project"
version = "1.0.0"
description = "Retro groove dark theme with warm, earthy tones. Based on gruvbox by morhetz."
dark = true

[ansi]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

bright_black = "#928374"
bright_red = "#fb4934"
bright_green = "#b8bb26"
bright_yellow = "#fabd2f"
bright_blue = "#83a598"
bright_magenta = "#d3869b"
bright_cyan = "#8ec07c"
bright_white = "#ebdbb2"

# Palette: darkest→lightest
# neutral: 0=#282828  1=#3c3836  2=#504945  3=#665c54  4=#a89984  5=#bdae93  6=#d5c4a1  7=#ebdbb2  8=#fbf1c7
# red:     0=#9d0006  1=#cc241d  2=#fb4934
# green:   0=#427b58  1=#98971a  2=#b8bb26
# yellow:  0=#b57614  1=#d79921  2=#fabd2f
# blue:    0=#076678  1=#458588  2=#83a598
# purple:  0=#8f3f71  1=#b16286  2=#d3869b
# aqua:    0=#427b58  1=#689d6a  2=#8ec07c
# orange:  0=#af3a03  1=#d65d0e  2=#fe8019
[palette]
neutral = [
  "#282828",
  "#3c3836",
  "#504945",
  "#665c54",
  "#a89984",
  "#bdae93",
  "#d5c4a1",
  "#ebdbb2",
]
red = ["#9d0006", "#cc241d", "#fb4934"]
green = ["#427b58", "#98971a", "#b8bb26"]
yellow = ["#b57614", "#d79921", "#fabd2f"]
blue = ["#076678", "#458588", "#83a598"]
purple = ["#8f3f71", "#b16286", "#d3869b"]
aqua = ["#427b58", "#689d6a", "#8ec07c"]
orange = ["#af3a03", "#d65d0e", "#fe8019"]

[base16]
base00 = "palette.neutral.0"
base01 = "palette.neutral.1"
base02 = "palette.neutral.2"
base03 = "palette.neutral.3"
base04 = "palette.neutral.4"
base05 = "palette.neutral.7"
base06 = "ansi.bright_white"
base07 = "#fbf1c7"
base08 = "palette.red.1"
base09 = "palette.orange.1"
base0A = "palette.yellow.1"
base0B = "palette.green.1"
base0C = "palette.aqua.1"
base0D = "palette.blue.1"
base0E = "palette.purple.1"
base0F = "palette.red.0"

[semantic]
error = "palette.red.2"
warning = "palette.yellow.2"
info = "palette.blue.2"
success = "palette.green.2"
highlight = "palette.yellow.1"
link = "palette.blue.2"

[ui.bg]
primary = "palette.neutral.0"
secondary = "palette.neutral.1"

[ui.fg]
primary = "ansi.bright_white"
secondary = "palette.neutral.7"
muted = "palette.neutral.4"

[ui.border]
primary = "palette.neutral.3"
muted = "palette.neutral.2"

[ui.cursor]
primary = "palette.yellow.2"
muted = "palette.neutral.4"

[ui.selection]
bg = "palette.neutral.2"
fg = "ansi.bright_white"
