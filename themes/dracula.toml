[theme]
name = "Dracula"
slug = "dracula"
author = "Zeno Rocha / draculatheme.com"
version = "1.0.0"
description = "Based on https://draculatheme.com/"
dark = true

[ansi]
black = "#21222C"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

bright_black = "#6272a4"
bright_red = "#ff79c6"
bright_green = "#69ff94"
bright_yellow = "#ffffa5"
bright_blue = "#d6acff"
bright_magenta = "#ff92df"
bright_cyan = "#a4ffff"
bright_white = "#ffffff"

[palette]
neutral = [
  "ansi.black",
  "#282a36",
  "#44475a",
  "ansi.bright_black",
  "ansi.white",
]
red = ["ansi.red", "#ff6e6e", "ansi.bright_red"]
purple = ["#bd93f9"]
orange = ["#ffb86c"]


[base16]
base00 = "ansi.black"
base01 = "ansi.red"
base02 = "ansi.green"
base03 = "ansi.yellow"
base04 = "ansi.blue"
base05 = "ansi.magenta"
base06 = "ansi.cyan"
base07 = "ansi.bright_black"
base08 = "ansi.bright_black"
base09 = "ansi.bright_red"
base0A = "ansi.bright_green"
base0B = "ansi.bright_yellow"
base0C = "ansi.bright_blue"
base0D = "ansi.bright_magenta"
base0E = "ansi.bright_cyan"
base0F = "ansi.bright_black"

[semantic]
error = "ansi.red"
warning = "palette.orange.0"
success = "ansi.green"
info = "ansi.cyan"
highlight = "ansi.yellow"
link = "palette.purple.0"

[ui.bg]
primary = "palette.neutral.0"
secondary = "palette.neutral.1"

[ui.fg]
primary = "palette.neutral.4"
secondary = "palette.neutral.3"
muted = "palette.neutral.2"

[ui.border]
primary = "palette.purple.0"
muted = "palette.neutral.1"

[ui.cursor]
primary = "palette.neutral.3"
muted = "palette.neutral.2"

[ui.selection]
bg = "palette.neutral.1"
fg = "palette.neutral.3"
